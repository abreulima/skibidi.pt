<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Galeria de Imagens</title>
    <style>
        :root {
            font-family: Arial, Helvetica, sans-serif;
            color: #172033;
            background: #f4f6fb;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 32px;
        }

        main {
            width: min(1100px, 100%);
        }

        h1 {
            margin: 0 0 8px;
            font-size: clamp(2rem, 4vw, 3.2rem);
        }

        p {
            margin: 0 0 24px;
            color: #5b6475;
            font-size: 1.05rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
            gap: 18px;
        }

        .card {
            display: block;
            overflow: hidden;
            border-radius: 20px;
            background: white;
            text-decoration: none;
            color: inherit;
            box-shadow: 0 10px 30px rgba(20, 35, 70, 0.08);
            border: 1px solid rgba(20, 35, 70, 0.08);
            transition: transform 160ms ease, box-shadow 160ms ease;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 18px 44px rgba(20, 35, 70, 0.16);
        }

        .image-wrap {
            width: 100%;
            aspect-ratio: 16 / 10;
            background: linear-gradient(135deg, #dde4f0, #f9fbff);
            display: grid;
            place-items: center;
            border-bottom: 1px solid rgba(20, 35, 70, 0.08);
        }

        img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .title {
            display: block;
            font-weight: 700;
            font-size: 1.18rem;
            margin: 16px 16px 6px;
        }

        .filename {
            display: block;
            color: #60708a;
            font-family: "Courier New", monospace;
            font-size: 0.92rem;
            margin: 0 16px 16px;
            word-break: break-word;
        }
    </style>
</head>
<body>
    <main>
        <h1>Galeria de Imagens</h1>
        <p>Clique em qualquer imagem para abrir o arquivo PNG original.</p>
        <section class="grid">
        <a class="card" href="os_metalicos.png" target="_blank" rel="noopener" aria-label="Abrir imagem Os Metálicos">
            <div class="image-wrap">
                <img src="os_metalicos.png" alt="Os Metálicos">
            </div>
            <span class="title">Os Metálicos</span>
            <span class="filename">os_metalicos.png</span>
        </a>
        <a class="card" href="o_exterminador.png" target="_blank" rel="noopener" aria-label="Abrir imagem O Exterminador">
            <div class="image-wrap">
                <img src="o_exterminador.png" alt="O Exterminador">
            </div>
            <span class="title">O Exterminador</span>
            <span class="filename">o_exterminador.png</span>
        </a>
        <a class="card" href="robotics_destroyers.png" target="_blank" rel="noopener" aria-label="Abrir imagem Robotics Destroyers">
            <div class="image-wrap">
                <img src="robotics_destroyers.png" alt="Robotics Destroyers">
            </div>
            <span class="title">Robotics Destroyers</span>
            <span class="filename">robotics_destroyers.png</span>
        </a>
        <a class="card" href="os_tung_tung_sahur.png" target="_blank" rel="noopener" aria-label="Abrir imagem Os Tung Tung Sahur">
            <div class="image-wrap">
                <img src="os_tung_tung_sahur.png" alt="Os Tung Tung Sahur">
            </div>
            <span class="title">Os Tung Tung Sahur</span>
            <span class="filename">os_tung_tung_sahur.png</span>
        </a>
        <a class="card" href="robos.png" target="_blank" rel="noopener" aria-label="Abrir imagem Robôs">
            <div class="image-wrap">
                <img src="robos.png" alt="Robôs">
            </div>
            <span class="title">Robôs</span>
            <span class="filename">robos.png</span>
        </a>
        </section>
    </main>
</body>
</html>
