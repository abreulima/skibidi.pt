<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Quiz de introdução à programação em Java">
  <title>Quiz de Java</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="quiz-container">
    <header class="quiz-header">
      <p class="eyebrow">Introdução à programação</p>
      <h1>Quiz de Java</h1>
      <p>Escolhe a resposta correta em cada pergunta.</p>
    </header>

    <section id="start-screen" class="card">
      <h2>Preparado?</h2>
      <p>O quiz tem <strong id="question-count"></strong> perguntas de escolha múltipla.</p>
      <button id="start-button" class="primary-button">Começar quiz</button>
    </section>

    <section id="quiz-screen" class="card hidden" aria-live="polite">
      <div class="quiz-meta">
        <span id="progress-text">Pergunta 1</span>
        <span id="score-text">Pontuação: 0</span>
      </div>

      <div class="progress-bar" aria-hidden="true">
        <div id="progress-fill"></div>
      </div>

      <h2 id="question-text"></h2>
      <div id="answer-buttons" class="answer-grid"></div>

      <p id="feedback" class="feedback" role="status"></p>

      <button id="next-button" class="primary-button hidden">Próxima pergunta</button>
    </section>

    <section id="result-screen" class="card hidden">
      <h2>Resultado final</h2>
      <p id="result-text" class="result-text"></p>
      <p id="result-message"></p>
      <button id="restart-button" class="primary-button">Repetir quiz</button>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
